services:
  webserver:
    container_name: effective-mobile-backend-$TAG
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    container_name: effective-mobile-nginx-$TAG
    image: nginx:stable-alpine
    networks:
      - backend
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    security_opt:
      - no-new-privileges:true
    depends_on:
      - webserver

networks:
  backend:
   driver: bridge
