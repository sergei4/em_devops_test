services:
  webserver:
    container_name: effective-mobile-backend-$TAG
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    container_name: effective-mobile-nginx-$TAG
    image: nginx:stable-alpine
    restart: unless-stopped
    networks:
      - backend
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    security_opt:
      - no-new-privileges:true
    depends_on:
      webserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  backend:
    driver: bridge
